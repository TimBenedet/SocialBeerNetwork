apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: socialbeernetwork-data
  namespace: default
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 256Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: socialbeernetwork-backend
  namespace: default
spec:
  replicas: 1
  # RWO volume can't attach to two pods at once → recreate, don't roll.
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: socialbeernetwork-backend
  template:
    metadata:
      labels:
        app: socialbeernetwork-backend
    spec:
      containers:
      - name: backend
        image: ghcr.io/timbenedet/socialbeernetwork-backend:main-5c8f765
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
        volumeMounts:
        - name: data
          mountPath: /data
        env:
        - name: PORT
          value: "3001"
        - name: DATA_DIR
          value: "/data"
        # Identifiants injectés via Secret (pas en dur dans l'image)
        - name: TIM_USERNAME
          valueFrom:
            secretKeyRef: { name: socialbeernetwork-auth, key: TIM_USERNAME }
        - name: TIM_PASSWORD
          valueFrom:
            secretKeyRef: { name: socialbeernetwork-auth, key: TIM_PASSWORD }
        - name: GUEST_USERNAME
          valueFrom:
            secretKeyRef: { name: socialbeernetwork-auth, key: GUEST_USERNAME }
        - name: GUEST_PASSWORD
          valueFrom:
            secretKeyRef: { name: socialbeernetwork-auth, key: GUEST_PASSWORD }
        readinessProbe:
          httpGet: { path: /api/health, port: 3001 }
          initialDelaySeconds: 3
          periodSeconds: 10
        livenessProbe:
          httpGet: { path: /api/health, port: 3001 }
          initialDelaySeconds: 5
          periodSeconds: 20
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: socialbeernetwork-data
---
apiVersion: v1
kind: Service
metadata:
  name: socialbeernetwork-backend
  namespace: default
spec:
  selector:
    app: socialbeernetwork-backend
  ports:
  - port: 3001
    targetPort: 3001
  type: ClusterIP
