apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: untappd-reborn
  annotations:
    # --- HTTPS automatique via cert-manager (optionnel) ---
    # Décommente si cert-manager + un ClusterIssuer sont installés :
    # cert-manager.io/cluster-issuer: letsencrypt-prod
spec:
  # 👇 Nom de ta classe d'ingress (nginx, traefik…). `kubectl get ingressclass`
  ingressClassName: nginx
  rules:
    # 👇 À REMPLACER par ton domaine
    - host: untappd.mondomaine.fr
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: untappd-reborn
                port:
                  number: 80
  # --- Bloc TLS (optionnel, à activer avec cert-manager) ---
  # tls:
  #   - hosts:
  #       - untappd.mondomaine.fr
  #     secretName: untappd-reborn-tls
