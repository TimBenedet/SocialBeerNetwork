server {
    listen       80;
    server_name  _;

    root   /usr/share/nginx/html;
    index  index.html;

    # gzip pour alléger les transferts
    gzip            on;
    gzip_types      text/css application/javascript image/svg+xml;
    gzip_min_length 512;

    # Les fichiers .jsx sont chargés par Babel dans le navigateur :
    # on force un type JavaScript et on évite un cache trop agressif.
    location ~* \.jsx$ {
        default_type application/javascript;
        add_header   Cache-Control "no-cache";
    }

    # Cache court pour les assets statiques
    location ~* \.(css|js|woff2?|png|jpe?g|svg|ico)$ {
        expires   1h;
        add_header Cache-Control "public";
    }

    # Tout le reste retombe sur index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
